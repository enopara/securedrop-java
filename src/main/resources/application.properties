spring.application.name=securedrop

spring.datasource.url=jdbc:mysql://localhost:3307/securedrop
spring.datasource.username=securedrop_user
spring.datasource.password=securedrop_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

securedrop.jwt.secret=${SECUREDROP_JWT_SECRET:change-this-development-secret-for-class-demo-only}
securedrop.jwt.expiration-seconds=3600

securedrop.crypto.mistake-mode=${SECUREDROP_CRYPTO_MISTAKE_MODE:secure}
